name: CI

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies (Ubuntu)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libavcodec-dev libavformat-dev libavutil-dev libswresample-dev portaudio19-dev libflac-dev cmake ninja-build

    - name: Install dependencies (macOS)
      if: runner.os == 'macOS'
      run: |
        brew install ffmpeg portaudio flac cmake ninja

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build pytest numpy

    - name: Build C++ library
      run: |
        mkdir -p build && cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=ON -DBUILD_PYTHON=OFF -DENABLE_RNNOISE=ON -DENABLE_WHISPER=ON -GNinja
        ninja

    - name: Run C++ tests
      run: |
        cd build && ./tests/ffvoice_tests --gtest_brief=1

    - name: Build Python package
      run: pip install -e ".[mcp]"

    - name: Test Python import
      run: |
        python -c "import ffvoice; print('ffvoice version:', ffvoice.__version__)"

    - name: Run Python tests
      run: |
        pytest python/tests -v

    - name: Smoke-test Python examples (import + dry-run)
      # Verify examples are importable and their argument-parsing code works.
      # Full execution requires audio hardware and Whisper model files, so we
      # only import and exercise lightweight code paths here.
      run: |
        python -c "
        import importlib.util, sys, pathlib, types

        # Helper: import a script file as a module without executing __main__
        def import_script(path):
            spec = importlib.util.spec_from_file_location('_script', path)
            mod = importlib.util.module_from_spec(spec)
            spec.loader.exec_module(mod)
            return mod

        examples_dir = pathlib.Path('python/examples')
        scripts = sorted(examples_dir.glob('*.py'))
        if not scripts:
            print('WARNING: no example scripts found under python/examples/')
            sys.exit(1)

        errors = []
        for script in scripts:
            print(f'Checking: {script.name} ... ', end='', flush=True)
            try:
                import_script(script)
                print('OK')
            except SystemExit:
                # Some scripts call sys.exit() at import time when run without
                # args; treat that as a pass (the module loaded).
                print('OK (exited)')
            except Exception as exc:
                print(f'FAILED: {exc}')
                errors.append((script.name, exc))

        if errors:
            print()
            for name, exc in errors:
                print(f'FAIL {name}: {exc}')
            sys.exit(1)

        print(f'All {len(scripts)} example script(s) imported successfully.')
        "

  build-and-test-windows:
    name: Build and Test (Windows)
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install vcpkg and C++ dependencies
      shell: pwsh
      run: |
        # Bootstrap vcpkg (pre-installed on windows-latest at $env:VCPKG_INSTALLATION_ROOT)
        $vcpkg = "$env:VCPKG_INSTALLATION_ROOT\vcpkg.exe"
        & $vcpkg install ffmpeg portaudio libflac --triplet x64-windows
        echo "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" >> $env:GITHUB_ENV

    - name: Build C++ library and tests
      shell: pwsh
      run: |
        cmake -B build `
          -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" `
          -DVCPKG_TARGET_TRIPLET=x64-windows `
          -DCMAKE_BUILD_TYPE=Release `
          -DBUILD_TESTS=ON `
          -DBUILD_PYTHON=OFF `
          -DENABLE_RNNOISE=OFF `
          -DENABLE_WHISPER=ON
        cmake --build build --config Release -j 4

    - name: Run C++ tests
      shell: pwsh
      run: |
        ctest --test-dir build --build-config Release --output-on-failure

  build-wheels:
    name: Build wheels
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies (Ubuntu)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libavcodec-dev libavformat-dev libavutil-dev libswresample-dev portaudio19-dev libflac-dev cmake

    - name: Install dependencies (macOS)
      if: runner.os == 'macOS'
      run: |
        brew install ffmpeg portaudio flac cmake

    - name: Build wheel
      run: |
        pip install build
        python -m build --wheel

    - name: Upload wheel
      uses: actions/upload-artifact@v4
      with:
        name: wheels-${{ matrix.os }}
        path: dist/*.whl
        retention-days: 7

  clang-format-check:
    name: C++ Formatting Check (clang-format)
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install clang-format
      run: |
        # Pinned for reproducibility so CI and local formatting are identical.
        # Locally: pip install clang-format==22.1.5  (see scripts/format.sh)
        pip install clang-format==22.1.5
        clang-format --version

    - name: Check C++ formatting
      run: |
        UNFORMATTED=()
        while IFS= read -r -d '' file; do
          if ! clang-format --dry-run --Werror "$file" 2>/dev/null; then
            UNFORMATTED+=("$file")
          fi
        done < <(find src apps include tests \
          \( -name '*.cpp' -o -name '*.h' -o -name '*.hpp' -o -name '*.cc' \) \
          -print0)

        if [ ${#UNFORMATTED[@]} -gt 0 ]; then
          echo "The following files are not properly formatted:"
          printf '  %s\n' "${UNFORMATTED[@]}"
          echo ""
          echo "Run './scripts/format.sh' locally to fix formatting."
          exit 1
        fi
        echo "All C++ files are properly formatted."
